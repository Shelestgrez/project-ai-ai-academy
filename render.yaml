databases:
  - name: ai-academy-db
    plan: free
    databaseName: ai_academy
    user: ai_academy

services:
  - type: web
    name: ai-academy-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-academy-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
